version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ironman_postgres
    environment:
      POSTGRES_DB: ironman
      POSTGRES_USER: ironman
      POSTGRES_PASSWORD: ironman
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironman -d ironman"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ironman_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: ironman_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ironman_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Placeholder runtime service for local models.

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
